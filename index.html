<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CIP Master Scheduler v2.5</title>
    <!-- Tailwind CSS for Styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & Babel for Logic -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .font-mono { font-family: 'JetBrains Mono', monospace; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        @media print { .no-print { display: none; } }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;

        // Simple Date Helper since we aren't using a heavy library
        const addMonths = (date, months) => {
            const d = new Date(date);
            d.setMonth(d.getMonth() + months);
            return d;
        };

        const formatMonthYear = (date) => {
            return new Intl.DateTimeFormat('en-US', { month: 'short', year: '2-digit' }).format(date);
        };

        const formatFullDate = (date) => {
            return new Intl.DateTimeFormat('en-US', { month: '2-digit', day: '2-digit', year: '4-digit' }).format(date);
        };

        function App() {
            const [projectName, setProjectName] = useState('New Capital Project');
            const [projectNumber, setProjectNumber] = useState('CIP-2026-001');
            const [startDate, setStartDate] = useState(new Date().toISOString().split('T')[0]);
            
            // Phase Durations
            const [durations, setDurations] = useState({
                initiation: 1,
                procureDesign: 2,
                design: 6,
                procureConst: 2,
                construction: 12,
                closeout: 2
            });

            // Logic Toggles
            const [useRFQ, setUseRFQ] = useState(false);
            const [councilDate, setCouncilDate] = useState('');
            const [useBid, setUseBid] = useState(true);

            // Calculate Timeline
            const schedule = useMemo(() => {
                const phases = [];
                let current = new Date(startDate);
                current.setDate(1); // Start at beginning of month

                const addPhase = (id, name, duration, color, isSpecial = false) => {
                    const start = new Date(current);
                    const end = addMonths(start, duration);
                    phases.push({ id, name, start, end, duration, color, isSpecial });
                    current = end;
                };

                // 1. Initiation
                addPhase('init', 'Project Initiation', durations.initiation, 'bg-slate-400');
                
                // 2. RFQ
                if (useRFQ) addPhase('rfq', 'RFQ Selection Process', 3, 'bg-cyan-500', true);

                // 3. Procure Design
                addPhase('p-design', 'Procure Design Contract', durations.procureDesign, 'bg-slate-400');

                // 4. Council
                if (councilDate) addPhase('council', 'Council Approval Window', 2, 'bg-rose-500', true);

                // 5. Design
                addPhase('design', 'Design Phase', durations.design, 'bg-blue-500');

                // 6. Bidding
                if (useBid) addPhase('bid', 'Public Bidding Process', 6, 'bg-slate-700', true);

                // 7. Procure Construction
                addPhase('p-const', 'Procure Construction Contract', durations.procureConst, 'bg-slate-400');

                // 8. Construction
                addPhase('const', 'Construction Phase', durations.construction, 'bg-orange-500');

                // 9. Closeout
                addPhase('close', 'Project Closeout', durations.closeout, 'bg-slate-800');

                // Generate Month columns for the grid
                const months = [];
                const totalMonths = Math.ceil((phases[phases.length-1].end - phases[0].start) / (1000 * 60 * 60 * 24 * 30.44)) + 1;
                for(let i=0; i < totalMonths; i++) {
                    months.push(addMonths(phases[0].start, i));
                }

                return { phases, months, start: phases[0].start, end: phases[phases.length-1].end };
            }, [startDate, durations, useRFQ, councilDate, useBid]);

            return (
                <div className="min-h-screen flex flex-col">
                    {/* Header */}
                    <header className="h-16 bg-slate-900 text-white px-8 flex items-center justify-between shadow-md z-20 no-print">
                        <div className="flex items-center gap-3">
                            <div className="w-8 h-8 bg-blue-500 rounded-sm flex items-center justify-center font-bold text-lg">C</div>
                            <h1 className="text-xl font-semibold tracking-tight">CIP Master Scheduler <span className="text-slate-400 font-normal text-sm ml-2">v2.5</span></h1>
                        </div>
                        <div className="flex gap-3">
                            <button onClick={() => window.print()} className="px-4 py-1.5 bg-slate-700 hover:bg-slate-600 rounded text-xs font-medium">Export PDF</button>
                        </div>
                    </header>

                    <main className="flex flex-1 overflow-hidden">
                        {/* Sidebar */}
                        <aside className="w-80 bg-white border-r border-slate-200 p-6 flex flex-col gap-6 overflow-y-auto no-print">
                            <section>
                                <h2 className="text-xs font-bold uppercase text-slate-400 mb-4 tracking-widest">Project Metadata</h2>
                                <div className="space-y-3">
                                    <input type="text" value={projectName} onChange={e => setProjectName(e.target.value)} className="w-full px-3 py-2 bg-slate-50 border border-slate-200 rounded text-sm font-medium" placeholder="Project Name" />
                                    <input type="text" value={projectNumber} onChange={e => setProjectNumber(e.target.value)} className="w-full px-3 py-2 bg-slate-50 border border-slate-200 rounded text-xs font-mono" placeholder="Project #" />
                                    <input type="date" value={startDate} onChange={e => setStartDate(e.target.value)} className="w-full px-3 py-2 bg-slate-50 border border-slate-100 rounded text-sm" />
                                </div>
                            </section>

                            <hr />

                            <section className="space-y-4">
                                <h2 className="text-xs font-bold uppercase text-slate-400 tracking-widest">Workflow</h2>
                                
                                {/* RFQ Toggle */}
                                <div className={`p-3 rounded border ${useRFQ ? 'bg-cyan-50 border-cyan-100' : 'bg-slate-50 border-transparent'}`}>
                                    <label className="flex items-center justify-between cursor-pointer">
                                        <span className="text-xs font-bold">RFQ/Selection?</span>
                                        <input type="checkbox" checked={useRFQ} onChange={() => setUseRFQ(!useRFQ)} className="w-4 h-4" />
                                    </label>
                                </div>

                                {/* Council Date */}
                                <div className={`p-3 rounded border ${councilDate ? 'bg-rose-50 border-rose-100' : 'bg-slate-50 border-transparent'}`}>
                                    <label className="block text-[10px] font-bold text-slate-400 uppercase mb-1">Council Approval</label>
                                    <input type="date" value={councilDate} onChange={e => setCouncilDate(e.target.value)} className="w-full text-xs p-1 border rounded" />
                                </div>

                                {/* Bid Toggle */}
                                <div className={`p-3 rounded border ${useBid ? 'bg-slate-800 text-white' : 'bg-green-50 border-green-100'}`}>
                                    <label className="flex items-center justify-between cursor-pointer">
                                        <span className="text-xs font-bold">{useBid ? 'Bidding Required' : 'Using JOC'}</span>
                                        <input type="checkbox" checked={useBid} onChange={() => setUseBid(!useBid)} className="accent-blue-500" />
                                    </label>
                                </div>

                                {/* Durations */}
                                <div className="space-y-4 pt-2">
                                    {Object.entries(durations).map(([key, val]) => (
                                        <div key={key} className="flex flex-col gap-1">
                                            <div className="flex justify-between text-[10px] font-bold text-slate-500 uppercase">
                                                <span>{key.replace(/([A-Z])/g, ' $1')}</span>
                                                <span>{val} mo</span>
                                            </div>
                                            <input type="range" min="1" max="24" value={val} onChange={e => setDurations({...durations, [key]: parseInt(e.target.value)})} className="w-full accent-slate-900" />
                                        </div>
                                    ))}
                                </div>
                            </section>
                        </aside>

                        {/* Schedule Content */}
                        <section className="flex-1 p-8 bg-slate-50 overflow-auto">
                            <div className="max-w-6xl mx-auto space-y-6">
                                {/* Title Area */}
                                <div className="flex justify-between items-end">
                                    <div>
                                        <h1 className="text-3xl font-black text-slate-900 leading-none mb-2">{projectName}</h1>
                                        <p className="text-xs font-mono text-slate-400 uppercase tracking-widest">{projectNumber}</p>
                                    </div>
                                    <div className="text-right">
                                        <p className="text-[10px] font-bold text-slate-400 uppercase mb-1">Target Completion</p>
                                        <p className="text-xl font-bold text-blue-600">{formatMonthYear(schedule.end)}</p>
                                    </div>
                                </div>

                                {/* Gantt Chart Card */}
                                <div className="bg-white border border-slate-200 rounded-xl shadow-sm overflow-hidden flex flex-col">
                                    <div className="flex bg-slate-50 border-b border-slate-200 overflow-x-auto no-scrollbar">
                                        <div className="w-48 flex-shrink-0 p-4 border-r border-slate-200 text-[10px] font-black uppercase text-slate-400 tracking-widest">Phase</div>
                                        <div className="flex flex-1">
                                            {schedule.months.map((m, i) => (
                                                <div key={i} className="w-20 flex-shrink-0 p-4 text-[9px] font-bold text-slate-400 border-r border-slate-100 text-center">
                                                    {formatMonthYear(m)}
                                                </div>
                                            ))}
                                        </div>
                                    </div>

                                    <div className="relative overflow-x-auto">
                                        {schedule.phases.map((p, i) => {
                                            const startOffset = Math.ceil((p.start - schedule.start) / (1000 * 60 * 60 * 24 * 30.44));
                                            return (
                                                <div key={i} className={`flex border-b border-slate-50 h-14 items-center ${p.id === 'design' ? 'bg-blue-50/20' : p.id === 'const' ? 'bg-orange-50/20' : ''}`}>
                                                    <div className="w-48 flex-shrink-0 px-4 text-xs font-bold text-slate-700">{p.name}</div>
                                                    <div className="flex-1 relative h-full">
                                                        <div 
                                                            className={`absolute top-3 h-8 rounded-sm shadow-sm flex items-center justify-center text-[10px] text-white font-black ${p.color}`}
                                                            style={{ left: `${startOffset * 80 + 8}px`, width: `${p.duration * 80 - 16}px` }}
                                                        >
                                                            {p.duration >= 1 ? `M${Math.round(startOffset + p.duration)}` : ''}
                                                        </div>
                                                    </div>
                                                </div>
                                            );
                                        })}
                                    </div>
                                </div>

                                {/* Milestones Table */}
                                <div className="grid md:grid-cols-2 gap-8">
                                    <div className="bg-white border border-slate-200 rounded-xl overflow-hidden">
                                        <div className="bg-slate-50 px-4 py-3 border-b border-slate-200 text-[10px] font-black uppercase tracking-widest">Key Performance Milestones</div>
                                        <table className="w-full text-xs">
                                            <tbody>
                                                <tr className="border-b border-slate-50"><td className="p-3">Commencement</td><td className="p-3 text-right font-mono">{formatFullDate(schedule.start)}</td></tr>
                                                <tr className="border-b border-slate-50 bg-blue-50/30"><td className="p-3 font-bold">Construction NTP</td><td className="p-3 text-right font-mono font-bold">{formatFullDate(schedule.phases.find(x => x.id === 'const').start)}</td></tr>
                                                <tr><td className="p-3 font-black text-slate-900 uppercase">Substantial Completion</td><td className="p-3 text-right font-mono font-black text-blue-600">{formatFullDate(schedule.end)}</td></tr>
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            </div>
                        </section>
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
